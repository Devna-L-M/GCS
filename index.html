<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAMMARD GCS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div>Team: <strong>SAMMARD</strong> | Time: <span id="m-time">00:00</span> | Pkts: <span id="p-count">0</span></div>
        <div>
            <button id="launch-btn">Launch</button>
            <button id="download-btn">Download CSV</button>
            <!--<button id="cal-btn" onclick="calibrate()">Calibrate</button>-->
        </div>
    </header>

    <main class="grid-container">
        <section class="panel">
            <h3>Status & Log</h3>
            <div id="status-display">READY</div>
            <div id="console" class="console"></div>
        </section>

        <section class="panel center-panel">
    <div id="map"></div>
    <div class="bottom-center">
        <canvas id="altChart"></canvas>
        <div id="three-container"></div>
    </div>
</section>

        <section class="panel">
            <h3>Sensors</h3>
            <div id="sensor-readings">
                Altitude: <span id="val-alt">0</span> ft<br>
                Velocity: <span id="val-vel">0</span> mph<br>
                Pressure: <span id="val-pres">1013</span> Pa<br>
                Battery: <span id="val-batt">100</span>%<br>
                GPS: <span id="val-gps">0</span>°N, <span id="val-gps-lon">0</span>°E<br>
                Signal: <span id="val-rssi">-45</span> dBm<br>
                Range: <span id="val-range">0</span> ft<br>
            </div>

            
            
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
